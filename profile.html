<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои аренды — Сосед.Велком</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <div class="logo">
                        <span class="logo__icon">🏠</span>
                        <span class="logo__text">Сосед.<span class="logo__accent">Велком</span></span>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav__link">Главная</a>
                        <a href="profile.html" class="nav__link active">Мои аренды</a>
                    </nav>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="profile-header">
                <div class="profile-avatar">
                    <img src="https://randomuser.me/api/portraits/men/15.jpg" alt="Вы">
                </div>
                <div class="profile-info">
                    <h1>Алексей, 28 лет</h1>
                    <p>⭐ 4.95 · 14 отзывов · Сосед с 2024</p>
                </div>
            </div>

            <div class="profile-tabs">
                <button class="profile-tab active" data-tab="renting">Арендую я</button>
                <button class="profile-tab" data-tab="lending">Сдают у меня</button>
            </div>

            <!-- Вкладка: Арендую я -->
            <div class="profile-tab-content active" id="renting">
                <div class="rental-card">
                    <img src="https://images.unsplash.com/photo-1551698618-1dfe5d97d256?w=100&h=100&fit=crop" class="rental-card__image">
                    <div class="rental-card__info">
                        <h3>Сноуборд Burton 158 см</h3>
                        <p>Екатерина · до 20 мая</p>
                        <span class="status-badge status-active">Активно</span>
                        <button class="btn-small">Продлить</button>
                    </div>
                </div>
                <div class="rental-card">
                    <img src="https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?w=100&h=100&fit=crop" class="rental-card__image">
                    <div class="rental-card__info">
                        <h3>Проектор XGIMI Halo+</h3>
                        <p>Максим · завершено 10 мая</p>
                        <span class="status-badge status-completed">Завершено</span>
                        <button class="btn-small btn-outline">Оставить отзыв</button>
                    </div>
                </div>
            </div>

            <!-- Вкладка: Сдают у меня -->
            <div class="profile-tab-content" id="lending">
                <div class="rental-card">
                    <img src="https://images.unsplash.com/photo-1503602642458-232111445657?w=100&h=100&fit=crop" class="rental-card__image">
                    <div class="rental-card__info">
                        <h3>Костюм зайчика</h3>
                        <p>Запросил Дмитрий · ожидает подтверждения</p>
                        <span class="status-badge status-pending">Ожидает</span>
                        <button class="btn-small">Подтвердить</button>
                    </div>
                </div>
                <div class="empty-state" style="display: none;">
                    <span class="empty-state__icon">📦</span>
                    <p>Вы пока не сдаёте вещи</p>
                    <button class="btn-secondary">Добавить объявление</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Переключение табов
        const tabs = document.querySelectorAll('.profile-tab');
        const contents = document.querySelectorAll('.profile-tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                contents.forEach(c => c.classList.remove('active'));
                document.getElementById(target).classList.add('active');
            });
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
