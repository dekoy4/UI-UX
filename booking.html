<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование — Сосед.Велком</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <div class="logo">
                        <span class="logo__icon">🏠</span>
                        <span class="logo__text">Сосед.<span class="logo__accent">Велком</span></span>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav__link">Главная</a>
                        <a href="profile.html" class="nav__link">Мои аренды</a>
                    </nav>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="booking-container">
                <h1 class="booking-title">Подтверждение бронирования</h1>
                
                <div class="booking-summary" id="bookingSummary">
                    <!-- Сюда динамически подставится информация о товаре -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // База данных товаров
        const itemsDB = {
            drill: {
                id: 'drill',
                name: 'Аккумуляторная дрель Makita',
                owner: 'Антон',
                ownerAvatar: 'images/avatar-anton.jpg',
                pricePerDay: 300,
                deposit: 500,
                image: 'images/drill.jpg',
                floor: 7
            },
            snowboard: {
                id: 'snowboard',
                name: 'Сноуборд Burton 158 см',
                owner: 'Екатерина',
                ownerAvatar: 'images/avatar-ekaterina.jpg',
                pricePerDay: 500,
                deposit: 2000,
                image: 'images/snowboard.jpg',
                floor: 15
            },
            ladder: {
                id: 'ladder',
                name: 'Стремянка алюминиевая 4 ступени',
                owner: 'Олег',
                ownerAvatar: 'images/avatar-oleg.jpg',
                pricePerDay: 150,
                deposit: 500,
                image: 'images/ladder.jpg',
                floor: 23
            },
            projector: {
                id: 'projector',
                name: 'Проектор XGIMI Halo+',
                owner: 'Максим',
                ownerAvatar: 'images/avatar-maxim.jpg',
                pricePerDay: 400,
                deposit: 3000,
                image: 'images/projector.jpg',
                floor: 3
            }
        };

        // Получаем ID товара из URL
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');

        // Если ID нет или он некорректный — показываем ошибку или перенаправляем
        let currentItem = itemsDB[itemId];
        if (!currentItem) {
            currentItem = itemsDB['drill']; // по умолчанию дрель
        }

        // Устанавливаем даты
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        const startDateStr = today.toISOString().split('T')[0];
        const endDateStr = tomorrow.toISOString().split('T')[0];
        
        // Рассчитываем стоимость
        const days = 1;
        const rentPrice = currentItem.pricePerDay * days;
        const totalPrice = rentPrice + currentItem.deposit;

        // Генерируем HTML для страницы бронирования
        const bookingHTML = `
            <div class="booking-item">
                <img src="${currentItem.image}" class="booking-item__image" alt="${currentItem.name}">
                <div class="booking-item__info">
                    <h3>${currentItem.name}</h3>
                    <p>${currentItem.owner} · ${currentItem.floor} этаж</p>
                </div>
            </div>

            <div class="booking-dates">
                <div><strong>С ${startDateStr}</strong></div>
                <div><strong>По ${endDateStr}</strong> (${days} сутки)</div>
            </div>

            <div class="booking-price-list">
                <div class="price-row">
                    <span>Аренда (${days} сутки × ${currentItem.pricePerDay} ₽)</span>
                    <span>${rentPrice} ₽</span>
                </div>
                <div class="price-row">
                    <span>Залог (возвратный)</span>
                    <span>${currentItem.deposit} ₽</span>
                </div>
                <div class="price-row total">
                    <span>Итого к оплате</span>
                    <span>${totalPrice} ₽</span>
                </div>
            </div>

            <div class="booking-message">
                <label>Сообщение для ${currentItem.owner} (необязательно)</label>
                <textarea rows="3" placeholder="Напишите, когда удобно забрать..."></textarea>
            </div>

            <button class="btn-primary btn-block" onclick="alert('Запрос отправлен! Скоро с вами свяжется ${currentItem.owner} ✅')">Отправить запрос</button>
            <div class="booking-note">
                🔒 Оплата только после подтверждения соседом. Залог заморозится на карте.
            </div>
        `;

        document.getElementById('bookingSummary').innerHTML = bookingHTML;
    </script>
    <script src="script.js"></script>
</body>
</html>
